volumes:
  n8n_storage:

networks:
  ai-homelab:
    external: true

# Reuseable n8n config

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ["ai-homelab"]
  environment:
    DB_TYPE: postgresdb
    DB_POSTGRESDB_HOST: postgres
    DB_POSTGRESDB_USER: ${POSTGRES_USER}
    DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

    N8N_DIAGNOSTICS_ENABLED: false
    N8N_PERSONALIZATION_ENABLED: false

    N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}

    OLLAMA_HOST: ${OLLAMA_HOST:-ollama:11434}
    N8N_RESTRICT_FILE_ACCESS_TO: /data/shared

  volumes:
    - n8n_storage:/home/node/.n8n

services:
  n8n-import:
    <<: *service-n8n
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        if [ -f /demo-data/.imported ]; then
          echo "Already imported"
        else
          echo "Importing..."
          n8n import:credentials --separate --input=/demo-data/credentials
          n8n import:workflow --separate --input=/demo-data/workflows
          touch /demo-data/.imported
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    restart: unless-stopped
    user: root

    ports:
      - "${N8N_PORT}:5678"

    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
      - ./shared/rag-files:/data/rag-files

    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
